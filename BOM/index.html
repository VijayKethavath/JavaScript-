<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <button onclick="openwindow()">Open window</button>

  <script>
    let result;
    function openwindow() {
     result= window.open("https://example.com/", " ", "width=500px,height=500px");
     setTimeout(()=>{
      result.close();
     },5000)
    }

  </script>
</body>

</html>
