<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Stories</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="form.css">

</head>

<body>
  <!-- Navbar -->
  <div id="nav">
    <div class="logo">
      RouteStories
      <img src="https://img.icons8.com/ios/100/europe.png" / alt="">
    </div>


    <div class="menu" id="menu">
      <p onclick="window.location.href='home.html'">Home</p>
      <p onclick="window.location.href='book.html'">BOOKS</p>
      <p onclick="window.location.href='trips.html'">TRIPS</p>
      <p onclick="window.location.href='dest.html'">DESTINATIONS</p>

      <img onclick="window.location.href='index.html'" src="https://img.icons8.com/cotton/64/logout-rounded--v3.png"
        alt="" />

    </div>
  </div>

  <div class="form-container">
    <h2>Please fill the form to proceed</h2>

    <form id="userForm">

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone" required>
      </div>

      <div class="input-group">
        <label>Address</label>
        <textarea id="address" placeholder="Enter your address" required></textarea>
      </div>

      <div class="row">
        <div class="input-group">
          <label>City</label>
          <input type="text" id="city" required>
        </div>

        <div class="input-group">
          <label>State</label>
          <input type="text" id="state" required>
        </div>
      </div>

      <div class="input-group">
        <label>Pincode</label>
        <input type="text" id="pincode" required>
      </div>

      <button type="submit" class="btn-submit">Procced</button>

    </form>
  </div>
  <!--  -->

  <footer class="footer">
    <div class="footer-container">

      <div class="footer-item">
        <i class="fas fa-user"></i>
        <div>
          <p class="label">DESIGNED BY</p>
          <p class="value">Vijay Kethavath</p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="footer-item">
        <i class="fas fa-envelope"></i>
        <div>
          <p class="label">EMAIL</p>
          <p class="value">kethavathvijay2210@gmail.com</p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="footer-item">
        <i class="fas fa-phone"></i>
        <div>
          <p class="label">PHONE</p>
          <p class="value">+91 6302112484</p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="footer-item">
        <i class="fas fa-shield-alt"></i>
        <div>
          <p class="label">ALL RIGHTS</p>
          <p class="value">© 2026 RouteStories</p>
        </div>
      </div>

    </div>

    <div class="footer-bottom">
      <span>Explore. Dream. Discover.</span>
    </div>
  </footer>


  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


  <script src="form.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
