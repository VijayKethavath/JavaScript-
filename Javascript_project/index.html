<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="./index.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>
  <div class="main">
    <div class="background">
      <div class="brand">RouteStories</div>
      <div class="tagline">Not just places — moments you’ll return to.</div>
    </div>

    <form>
      <h3>Login</h3>
      <label>Username</label>
      <input id="email" type="email" placeholder=" Enter Email " required
        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="invaild mail">

      <label>Password</label>
      <input id="password" type="password" placeholder="password" required
        pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}"
        title="Must contain 8+ characters, uppercase, lowercase, number, and special character">

      <button id="submit" type="submit" class="login">Log In</button>

      <div class="register">
        Don't Have an Acount? <a href="register.html"> Rigister</a>
      </div>

      <script type="module" src="index.js" defer></script>

    </form>
  </div>
</body>

</html>
