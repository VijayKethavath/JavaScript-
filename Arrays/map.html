<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>map</title>
</head>
<body>
  <script>

    let arr=[1,2,3,4,5]
    let newarr = arr.map((ele)=>{
      return ele
    })
    console.log(newarr);

    let OE=arr.map((ele)=>ele%2==0?"even":"odd")
    console.log(OE)

    let num=arr.map((ele)=>ele*2)
    console.log(num)

    let name=["devi","deva","alivelu"]
    let upper=name.map((ele,index)=>ele.toUpperCase())
    console.log(upper)


    

  </script>
</body>
</html>
