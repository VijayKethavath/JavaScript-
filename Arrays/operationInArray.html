<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>array methods</title>
</head>
<body>
  
  <script>
    //PUSH ->Adding element at End
    let x=["A","B","C"];
    x.push("D")
    console.log("Push",x);
    console.log(x.push("E","F"));    // return the length
    console.log(x);

    //POP->Removing last Elemnt
    console.log(x.pop());            // return the removed Element
    console.log("Pop",x);

    //Unshift->Adding Element at Beginning
    console.log(x.unshift(10,20));  // return the length
    console.log("Unshift",x)

    //Shift->Removes first Element
    console.log(x.shift());         // return the removed Element
    console.log("shift",x);
    



    
    




    
    


    


    
    
  </script>

</body>
</html>
