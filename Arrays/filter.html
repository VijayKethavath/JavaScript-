<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter</title>
</head>
<body>
  <script>
    let arr=[15,22,10,28,20,11]
    let even=arr.filter((element)=>element%2==0)
    console.log(even);
    
    let num=[2,4,9,10,55,41,21]
    let val=num.filter(function(ele){
      return ele > 10
    })
    console.log(val)

  </script>
</body>
</html>
