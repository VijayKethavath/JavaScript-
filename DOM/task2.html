<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let div=document.createElement("div")
    let p=document.createElement("p")
    p.innerText="JavaScript"
    div.appendChild(p)
    document.body.appendChild(div)
    console.log(div)

    let div1=document.createElement("div")
    let h1=document.createElement("h1")
    let p1=document.createElement("p")
    h1.innerText="Animals"
    p1.innerText="Animals are living things that can move, eat, and sense the world around them."
    div1.appendChild(h1)
    div1.appendChild(p1)
    document.body.appendChild(div1)
    console.log(div1)

    let table=document.createElement("table")
    let tr=document.createElement("tr")
    table.appendChild(tr)
    table.border=1
    table.cellPadding=10
    let element=["Maths","Physics","Biology"]
    for(let ele of element){
      let td=document.createElement("td")
      td.innerText=ele
      tr.appendChild(td)
    }
    console.log(document.body.appendChild(table))


    let div2=document.createElement("div")
    let arr=["push","Pop","update","Delete","Send"]
    arr.forEach((data)=>{
      let button=document.createElement("button")
      button.innerText=(data)
      button.style.margin="5px"
      div2.appendChild(button)
    })
    document.body.appendChild(div2)
    console.log(div2)


    
  </script>
</body>
</html>
