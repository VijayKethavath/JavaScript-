<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./css.css">
  
</head>

<body>
  <div class="container">
    <fieldset>
      <legend>Form Validation using pattern(Regex)</legend>
    <form action="./home.html">
      <input id="name" type="text" placeholder="UserName" required>
      <p id="ename"></p>

      <input id="fname" type="text" placeholder="Full Name" required>
      <p id="efname"></p>

      <input id="password" type="password" placeholder="Password" required>
      <p id="epassword"></p>

      <input id="confirm" type="password" placeholder="Confirm Password" required>
      <p id="econfirm"></p>

      <input id="email" type="email" placeholder="Email" required>
      <p id="eemail"></p>

      <input id="no" type="text" placeholder="Number" required>
      <p id="eno"></p>

      <button>submit</button>


    </form>
    </fieldset>
  </div>

  <script src="./js.js"></script>

</body>

</html>
